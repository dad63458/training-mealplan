name: daily-mealplan
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate-plan.js
        env:
          SEND_KEY: ${{ secrets.SEND_KEY }}
